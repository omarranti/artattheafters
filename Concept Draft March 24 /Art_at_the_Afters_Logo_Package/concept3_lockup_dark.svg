<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <rect width="800" height="260" fill="#1A1A1A"/>

  <!-- Brushstroke "A" Icon -->
  <g transform="translate(155, 55)">
    <!-- Left leg -->
    <path d="M48 170 Q52 135 60 95 Q68 58 78 28 Q84 12 90 5 Q93 2 95 3" stroke="#FF3399" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <!-- Right leg -->
    <path d="M95 3 Q97 2 100 5 Q106 12 112 28 Q122 58 130 95 Q138 135 142 170" stroke="#FF3399" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <!-- Crossbar -->
    <path d="M62 110 Q78 104 95 108 Q112 112 128 106" stroke="#39FF33" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.75"/>
    <!-- Paint drip from left foot -->
    <path d="M48 172 Q47 186 49 198 Q50 206 48 212" stroke="#FF3399" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.65"/>
    <circle cx="48" cy="216" r="3.8" fill="#FF3399" opacity="0.65"/>
    <!-- Crossbar drip -->
    <path d="M97 114 Q98 125 96 134" stroke="#39FF33" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="96" cy="137" r="2.5" fill="#39FF33" opacity="0.5"/>
    <!-- Apex splatter -->
    <circle cx="95" cy="0" r="3" fill="#FF3399" opacity="0.45"/>
    <circle cx="105" cy="-1" r="1.8" fill="#FF3399" opacity="0.3"/>
    <circle cx="83" cy="0" r="1.5" fill="#FF3399" opacity="0.25"/>
  </g>

  <!-- Thin divider -->
  <line x1="370" y1="60" x2="370" y2="210" stroke="#333333" stroke-width="0.5"/>

  <!-- Wordmark -->
  <text x="400" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="3">ART</text>
  <text x="400" y="130" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="7" fill="#555555">AT THE</text>
  <text x="400" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#FFFFFF" letter-spacing="3">AFTERS</text>
  <!-- Brush underline -->
  <path d="M398 189 Q440 185 490 188 Q540 191 590 186" stroke="#39FF33" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Byline -->
  <text x="400" y="214" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#666666" font-style="italic" letter-spacing="1">by <tspan font-family="Georgia, 'Times New Roman', serif" fill="#888888" letter-spacing="2">Stevie Alger</tspan></text>
</svg>